<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Harshit Chaurasia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script>
        // Prevent FOUC
        (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');})();
    </script>
    <style>
        :root {
            --accent: #b45309;
            --text: #1c1917;
            --text-muted: #8c857f;
            --bg: #faf8f5;
            --bg-card: #ffffff;
            --border: #d6d3d1;
        }
        html[data-theme="dark"] {
            --accent: #d97706;
            --text: #f5f5f4;
            --text-muted: #8c857f;
            --bg: #1c1917;
            --bg-card: #292524;
            --border: #44403c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            text-align: center; padding: 24px;
        }
        .error-wrap { max-width: 480px; }
        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 6rem; font-weight: 700;
            color: var(--accent); line-height: 1;
            margin-bottom: 12px;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem; font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 0.92rem; color: var(--text-muted);
            line-height: 1.6; margin-bottom: 28px;
        }
        a {
            display: inline-block;
            padding: 10px 24px; font-size: 0.85rem;
            font-weight: 600; color: #fff;
            background: var(--accent); border-radius: 8px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="error-wrap">
        <div class="error-code">404</div>
        <h1>Page not found</h1>
        <p>This page doesn't exist, was moved, or you followed a broken link. No worries — head back to the portfolio.</p>
        <a href="/">Back to Portfolio</a>
    </div>
</body>
</html>

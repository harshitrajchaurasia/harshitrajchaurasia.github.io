name: github-stats

# Refreshes github-stats.json (read by the site's live activity panel).
# The built-in GITHUB_TOKEN covers PUBLIC contributions. To count private
# contributions too: create a PAT with read:user, add it as a repo secret
# named GH_STATS_TOKEN, and swap the GH_TOKEN line below to use it.

on:
  schedule:
    - cron: '17 4 * * *'   # daily, ~04:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: github-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOGIN: harshitrajchaurasia
        run: python3 .github/scripts/github_stats.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- github-stats.json; then
            echo "No change."
          else
            git config user.name  'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add github-stats.json
            git commit -m 'chore: refresh github-stats.json [skip ci]'
            git push
          fi

name: github-stats

# Refreshes github-stats.json (read by the site's live activity panel).
# Uses GH_STATS_TOKEN (a read:user PAT) so the contribution calendar counts
# PRIVATE contributions too; it falls back to the built-in GITHUB_TOKEN
# (public contributions only) if the secret is ever removed.

on:
  schedule:
    - cron: '17 4 * * *'   # daily, ~04:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: github-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN || secrets.GITHUB_TOKEN }}
          LOGIN: harshitrajchaurasia
        run: python3 .github/scripts/github_stats.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- github-stats.json; then
            echo "No change."
          else
            git config user.name  'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add github-stats.json
            git commit -m 'chore: refresh github-stats.json [skip ci]'
            git push
          fi

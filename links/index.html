<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Harshit Chaurasia - all links</title>
    <meta name="description" content="All of Harshit Chaurasia's links: portfolio, GitHub, LinkedIn, email, Steam.">
    <link rel="canonical" href="https://harshit.saakura.dev/links">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0e16'/%3E%3Ctext x='14' y='66' font-family='monospace' font-size='44' font-weight='800' fill='%235eead4'%3E%26gt;_%3C/text%3E%3C/svg%3E">
    <meta name="theme-color" content="#0a0d14">
    <script>
      (function(){
        var t=localStorage.getItem('theme');
        if(!t)t=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
        document.documentElement.setAttribute('data-theme',t);
      })();
    </script>
    <style>
      :root{
        --cyan:#2dd4bf; --violet:#b39dfb;
        --bg:#0a0d14; --surface:#11161f; --line:rgba(140,165,210,.22);
        --text:#e7ecf5; --text-2:#aab4c8; --text-3:#7f8aa0;
        --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
      }
      [data-theme="light"]{
        --cyan:#0a8f80; --violet:#6d4bd0;
        --bg:#f5f1e8; --surface:#fbf8f1; --line:rgba(60,50,35,.24);
        --text:#1c1a17; --text-2:#4a4640; --text-3:#6b6559;
      }
      *{box-sizing:border-box;}
      html,body{margin:0;}
      body{
        background:var(--bg); color:var(--text);
        font-family:var(--font-mono); line-height:1.6;
        -webkit-font-smoothing:antialiased;
        padding:clamp(1.5rem,6vw,3rem) 1.2rem;
        display:flex; justify-content:center;
      }
      main{width:100%; max-width:560px; min-width:0;}
      .prompt{color:var(--text-3); font-size:.85rem; margin:0 0 .4rem;}
      .prompt b{color:var(--cyan); font-weight:600;}
      h1{font-size:1.5rem; margin:0 0 .25rem; font-weight:700; letter-spacing:-.01em;}
      .tag{color:var(--text-2); margin:0 0 1.6rem; font-size:.95rem;}
      ul{list-style:none; margin:0 0 1.4rem; padding:0;}
      li{margin:0 0 .7rem;}
      a.link{
        display:flex; align-items:center; justify-content:space-between; gap:1rem;
        padding:.85rem 1.1rem; background:var(--surface); color:var(--text);
        border:1px solid var(--line); border-radius:10px;
        text-decoration:none; font-size:.95rem; font-weight:500;
        transition:border-color .18s ease, transform .18s ease;
      }
      a.link:hover,a.link:focus-visible{border-color:var(--cyan); transform:translateY(-2px);}
      a.link:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}
      a.link.primary{border-color:var(--cyan);}
      a.link .label .sub{color:var(--text-3); font-size:.78rem; font-weight:400; margin-left:.45rem;}
      a.link .arrow{color:var(--text-3); flex:none;}
      .mirror{
        font-size:.8rem; color:var(--text-3);
        border-top:1px dashed var(--line); padding-top:1rem; margin-top:.2rem;
      }
      .mirror a{color:var(--violet);}
      @media (prefers-reduced-motion: reduce){
        a.link{transition:none;}
        a.link:hover,a.link:focus-visible{transform:none;}
      }
    </style>
</head>
<body>
    <main>
        <p class="prompt">&gt; <b>harshit.sh</b> --links</p>
        <h1>Harshit Chaurasia</h1>
        <p class="tag">AI &amp; Automation Engineer. Everything in one place.</p>
        <ul>
            <li><a class="link primary" href="https://harshit.saakura.dev"><span class="label">Portfolio<span class="sub">harshit.saakura.dev</span></span><span class="arrow">-&gt;</span></a></li>
            <li><a class="link" href="https://github.com/harshitrajchaurasia"><span class="label">GitHub</span><span class="arrow">-&gt;</span></a></li>
            <li><a class="link" href="https://www.linkedin.com/in/harshit-raj-chaurasia"><span class="label">LinkedIn</span><span class="arrow">-&gt;</span></a></li>
            <li><a class="link" href="mailto:harshit1chaurasia@outlook.com"><span class="label">Email</span><span class="arrow">-&gt;</span></a></li>
            <li><a class="link" href="https://steamcommunity.com/id/erosiousharsh2"><span class="label">Steam</span><span class="arrow">-&gt;</span></a></li>
        </ul>
        <p class="mirror" id="mirror"></p>
    </main>
    <script>
      (function(){
        var h=location.hostname, el=document.getElementById('mirror');
        if(h.indexOf('saakura')>-1){
          el.innerHTML='You are on the primary (saakura.dev). Mirror: <a href="https://harshitrajchaurasia.github.io/links">harshitrajchaurasia.github.io/links</a>';
        } else if(h.indexOf('github.io')>-1){
          el.innerHTML='You are on the mirror (github.io). Primary: <a href="https://harshit.saakura.dev/links">harshit.saakura.dev/links</a>';
        } else {
          el.innerHTML='Primary: <a href="https://harshit.saakura.dev/links">saakura.dev/links</a> &middot; Mirror: <a href="https://harshitrajchaurasia.github.io/links">github.io/links</a>';
        }
      })();
    </script>
</body>
</html>
